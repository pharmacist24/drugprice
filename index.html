<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أسعار الأدوية</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@600;800&family=IBM+Plex+Sans+Arabic:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #121212;
            --bg-card: #1E1E1E;
            --accent: #00E676; /* Green */
            --text-main: #FFFFFF;
            --text-muted: #9E9E9E;
            --border: #2C2C2C;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 1.25rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Noto Kufi Arabic', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            margin: 0;
        }

        /* Search */
        .search-box {
            padding: 0.75rem 1rem;
            background: var(--bg);
            position: sticky;
            top: 60px; /* Height of header */
            z-index: 90;
            border-bottom: 1px solid var(--border);
        }

        input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--text-muted); }

        /* Container */
        .list-container {
            padding: 0.5rem;
        }

        /* Desktop Table View */
        @media (min-width: 768px) {
            .list-container {
                max-width: 800px;
                margin: 1rem auto;
                padding: 1rem;
            }
            
            .card-item { display: none !important; }

            table {
                width: 100%;
                border-collapse: collapse;
                background: var(--bg-card);
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            }

            th {
                text-align: right;
                padding: 1rem;
                font-size: 0.85rem;
                color: var(--text-muted);
                border-bottom: 1px solid var(--border);
            }

            td {
                padding: 1rem;
                border-bottom: 1px solid var(--border);
            }

            tr:last-child td { border-bottom: none; }

            .price-col {
                text-align: left;
                direction: ltr;
                font-weight: 600;
                color: var(--accent);
            }
        }

        /* Mobile Card View */
        @media (max-width: 767px) {
            table, thead, tbody, tr, th, td { display: none; }

            .card-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: var(--bg-card);
                margin-bottom: 0.5rem;
                padding: 1rem;
                border-radius: 8px;
                border-left: 4px solid var(--accent);
            }

            .name {
                font-weight: 500;
                font-size: 1rem;
            }

            .price {
                font-family: 'Noto Kufi Arabic', sans-serif;
                font-weight: 800;
                font-size: 1.1rem;
                color: var(--accent);
                direction: ltr; /* English Numbers */
            }
        }

        /* Status */
        .status-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <h1>قائمة أسعار الأدوية</h1>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث باسم الدواء...">
    </div>

    <div id="app" class="list-container">
        <div class="status-msg"><div class="spinner"></div>جاري التحميل...</div>
    </div>

    <script>
        // ==========================================
        // Configuration
        // ==========================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxt-cCpl1KWJjsFKggsHfyl_VFyqGS4FJlFzWKppsB00YtYcvEg8QcXiOtoih5_eQBf/exec';
        
        let drugsData = [];

        // ==========================================
        // Initialization
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Use Demo Data if URL not set
            if (APPS_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                loadDemoData();
            } else {
                fetchDrugs();
            }

            // Search Listener
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderList(e.target.value.trim().toLowerCase());
            });
        });

        // ==========================================
        // Data Fetching
        // ==========================================
        async function fetchDrugs() {
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                drugsData = data;
                renderList();
            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="status-msg">خطأ في الاتصال</div>';
            }
        }

        function loadDemoData() {
            drugsData = [
                { Drug_Name: 'باراسيتامول', Unit_Price: 250 },
                { Drug_Name: 'أموكسيسيلين', Unit_Price: 500 },
                { Drug_Name: 'ميروبينيم', Unit_Price: 15000 },
                { Drug_Name: 'فانكومايسين', Unit_Price: 12000 },
                { Drug_Name: 'سيبروفلوكساسين', Unit_Price: 750 },
                { Drug_Name: 'أوميبرازول', Unit_Price: 980 },
                { Drug_Name: 'سيفترياكسون', Unit_Price: 850 }
            ];
            renderList();
        }

        // ==========================================
        // Rendering
        // ==========================================
        function renderList(filter = '') {
            const filtered = drugsData.filter(d => d.Drug_Name.toLowerCase().includes(filter));
            
            if (filtered.length === 0) {
                document.getElementById('app').innerHTML = '<div class="status-msg">لا توجد نتائج</div>';
                return;
            }

            // 1. Desktop Table HTML
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>اسم الدواء</th>
                            <th style="text-align: left;">السعر (دينار)</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // 2. Mobile Cards HTML
            let cardsHTML = '';

            filtered.forEach(drug => {
                // English formatted number
                const priceFormatted = drug.Unit_Price.toLocaleString('en-US');

                // Desktop Row
                tableHTML += `
                    <tr>
                        <td style="font-weight: 500;">${drug.Drug_Name}</td>
                        <td class="price-col">${priceFormatted}</td>
                    </tr>
                `;

                // Mobile Card
                cardsHTML += `
                    <div class="card-item">
                        <span class="name">${drug.Drug_Name}</span>
                        <span class="price">${priceFormatted}</span>
                    </div>
                `;
            });

            tableHTML += '</tbody></table>';

            // Combine both (CSS handles visibility)
            document.getElementById('app').innerHTML = tableHTML + cardsHTML;
        }
    </script>

</body>
</html>
